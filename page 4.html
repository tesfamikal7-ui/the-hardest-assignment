<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Services</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(to bottom, rgb(246, 249, 250),  rgb(3, 201, 3));
    height: 8px;
}

/* SECTION */
.services{
    padding:60px;
    position:relative;
    color: rgb(9, 34, 145);
    
}

/* TITLE */
.services h2{text-align: center;
    top:20px;
    font-size:30px;
}

/* SERVICES */
.service-box{
    margin-top:80px;
}

.service{
    display:flex;
    margin-bottom:30px;
    font-size: 60px;
    font-weight: bold;
}

.icon{
    font-size:20px;
    margin-right:15px;
    font-size: 60px;
    font-weight: bold;
}

/* TEXT */
.service h3{
    font-size:16px;
}

.service p{
    font-size:30px;
    margin-top:5px;
    color:#222;
}

/* BOTTOM BAR */
.footer-bar{
    position:fixed;
    bottom:0;
    width:100%;
    background: darkcyan;
    color:white;
    padding:10px;
    text-align:center;
    font-size:14px;
} 
h2{color: black;
    font-style: italic;
    text-align: center;
}
</style>

</head>

<body>

<section class="services">

    <h2><u>My Services</u></h2>

    <div class="service-box">

        <div class="service">
            <div class="icon">&#128187; </div><br>
            <div>
                <h3>Web Design</h3>
                <p>I design a website by using html, css and javascript as mach as what i possible.</p>
            </div>
        </div>

        <div class="service">
            <div class="icon">&#127891; </div>
            <div>
                <h3>student</h3>
                <p>I learned at acadamic school.</p>
            </div>
        </div>

        <div class="service">
            <div class="icon">&#129490; </div>
            <div>
                <h3>child</h3>
                <p>I am child for my parent, it is also work.</p>
            </div>
        </div>

    </div>

</section>

<div class="footer-bar">
    Those are my service.
</div>

</body>
</html>
